<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>AI Performance Metrics</title>
    <link rel='stylesheet' href='/static/style_minimalist.css'>
    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
    <style>
        .metrics-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .control-group label {
            font-size: 14px;
            margin-bottom: 5px;
            color: var(--text-secondary);
        }
        .control-group input {
            padding: 8px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .home-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
        }
        .home-btn:hover {
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div style='padding: 40px;'>
        <a href='/' class='home-btn'>&larr; Back to Workspace</a>
        
        <div class="metrics-card">
            <h1 style="margin-bottom: 20px;">Llama-3.1 Evaluation Model</h1>
            <p style="color: var(--text-secondary); margin-bottom: 30px; font-size: 14px;">
                Interactive metric simulation. Adjust the parameters below to update the chart in real time.
            </p>
            
            <div class="controls">
                <div class="control-group">
                    <label>Accuracy (%)</label>
                    <input type="number" id="inpAcc" value="94.2" min="0" max="100" step="0.1">
                </div>
                <div class="control-group">
                    <label>Precision (%)</label>
                    <input type="number" id="inpPrec" value="89.5" min="0" max="100" step="0.1">
                </div>
                <div class="control-group">
                    <label>Recall (%)</label>
                    <input type="number" id="inpRec" value="91.8" min="0" max="100" step="0.1">
                </div>
            </div>

            <div style='width:100%; height:400px;'>
                <canvas id='metricsChart'></canvas>
            </div>
        </div>

        <script>
            let myChart = null;

            function initChart(acc, prec, rec) {
                const ctx = document.getElementById('metricsChart').getContext('2d');
                if(myChart) myChart.destroy();
                
                myChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Accuracy', 'Precision', 'Recall'],
                        datasets: [{
                            label: 'Model Performance Score (%)',
                            data: [acc, prec, rec],
                            backgroundColor: [
                                'rgba(102, 179, 255, 0.7)',
                                'rgba(153, 255, 153, 0.7)',
                                'rgba(255, 153, 153, 0.7)'
                            ],
                            borderColor: [
                                '#66b3ff',
                                '#99ff99',
                                '#ff9999'
                            ],
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            y: { 
                                beginAtZero: true, 
                                max: 100,
                                grid: { color: '#333' }
                            },
                            x: {
                                grid: { display: false }
                            }
                        },
                        plugins: {
                            legend: {
                                labels: { color: '#fff' }
                            }
                        }
                    }
                });
            }

            // Fetch default from API first
            fetch('/api/metrics').then(r=>r.json()).then(data=>{
                document.getElementById('inpAcc').value = data.accuracy;
                document.getElementById('inpPrec').value = data.precision;
                document.getElementById('inpRec').value = data.recall;
                initChart(data.accuracy, data.precision, data.recall);
            });

            // Update on input
            ['inpAcc', 'inpPrec', 'inpRec'].forEach(id => {
                document.getElementById(id).addEventListener('input', () => {
                    const acc = parseFloat(document.getElementById('inpAcc').value) || 0;
                    const prec = parseFloat(document.getElementById('inpPrec').value) || 0;
                    const rec = parseFloat(document.getElementById('inpRec').value) || 0;
                    initChart(acc, prec, rec);
                });
            });
        </script>
    </div>
</body>
</html>
